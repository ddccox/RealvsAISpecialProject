<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake vs. Real - Landing Page</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; /* Light gray background like the Figma canvas */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Landing Frame */
        .landing-page {
            position: relative;
            width: 100%;
            max-width: 960px;
            height: 540px;
            background: linear-gradient(135deg, #0b004f 0%, #05002b 40%, #17004a 100%);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
        }

        /* Left Content Section */
        .content-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-left: 60px;
            z-index: 10;
        }

        /* Typography */
        h1 {
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: #e2e8f0;
            margin-bottom: 45px;
            letter-spacing: 0.5px;
        }

        /* Center-Aligned Navigation Buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .btn {
            font-family: 'Courier New', Courier, monospace;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-block;
        }

        /* Specific Button Types */
        .btn-primary {
            background-color: rgba(147, 51, 234, 0.3); /* Translucent purple */
            color: #ff7ebb; /* Pink/magenta text */
            font-size: 1.05rem;
            padding: 10px 24px;
            border: 1px solid #7c3aed;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            background-color: rgba(236, 72, 153, 0.2);
            border-color: #ec4899;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        .btn-secondary {
            background-color: rgba(15, 12, 49, 0.6);
            color: #e2e8f0;
            font-size: 0.9rem;
            padding: 8px 20px;
            border: 1px solid #2e286c;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #94a3b8;
            color: #ffffff;
        }

        /* Right Visual Section (The Cyber Face Placeholder) */
        .visual-section {
            flex: 1;
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* Abstract CSS approximation of the face split */
        .face-placeholder {
            width: 90%;
            height: 100%;
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.3) 0%, rgba(236, 72, 153, 0.2) 100%);
            mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse at right, black 50%, transparent 90%);
            opacity: 0.7;
        }

        /* Floating Glitch Artifacts matched to screenshot placement */
        .glitch-bar {
            position: absolute;
            pointer-events: none;
            opacity: 0.85;
        }

        .gb-1 { top: 25%; left: 9%; width: 38px; height: 12px; background: #00f2fe; box-shadow: 0 4px 0 #ec4899; }
        .gb-2 { top: 23%; left: 37%; width: 55px; height: 18px; background: #ec4899; }
        .gb-3 { top: 26%; left: 49%; width: 14px; height: 25px; background: #00129c; opacity: 0.5; }
        .gb-4 { bottom: 23%; left: 20%; width: 14px; height: 16px; background: #5eead4; }
        .gb-5 { bottom: 20%; left: 47%; width: 55px; height: 5px; background: #ec4899; }
        .gb-6 { bottom: 12%; left: 38%; width: 55px; height: 10px; background: #5eead4; box-shadow: 35px 8px 0 #ec4899; }
        .gb-7 { bottom: 7%; left: 9%; width: 10px; height: 6px; background: #a855f7; }

    </style>
</head>
<body>

    <div class="landing-page">
        <div class="glitch-bar gb-1"></div>
        <div class="glitch-bar gb-2"></div>
        <div class="glitch-bar gb-3"></div>
        <div class="glitch-bar gb-4"></div>
        <div class="glitch-bar gb-5"></div>
        <div class="glitch-bar gb-6"></div>
        <div class="glitch-bar gb-7"></div>

        <div class="content-section">
            <h1>Deepfake vs. Real</h1>
            <p class="subtitle">Can you still trust what you see?</p>
            
            <div class="button-container">
                <a href="#start" class="btn btn-primary">Start Investigation</a>
                <a href="#about" class="btn btn-secondary">About</a>
                <a href="#play" class="btn btn-secondary">How to Play</a>
            </div>
        </div>

        <div class="visual-section">
            <div class="face-placeholder"></div>
        </div>
    </div>

</body>
</html>
